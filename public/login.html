<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Man Cave Inventory — Sign In</title>
  <link rel="icon" type="image/svg+xml" href="/images/logo.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-base: #0d0f14; --bg-surface: #161922; --bg-elevated: #1e2330;
      --bg-input: #1a1e2a; --border: #2e3447; --border-focus: #4f6ef7;
      --accent: #4f6ef7; --accent-hover: #6b87ff; --green: #3ecf8e;
      --red: #f55; --text-primary: #e8eaf2; --text-secondary: #8892a4;
      --text-muted: #5a6478; --radius: 10px; --radius-sm: 6px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-base); color: var(--text-primary); font-size: 14px;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-wrap {
      width: 100%; max-width: 400px; padding: 24px;
    }
    .login-brand {
      display: flex; align-items: center; gap: 12px;
      justify-content: center; margin-bottom: 32px;
    }
    .login-brand img { width: 40px; height: 40px; }
    .login-brand-name { font-size: 18px; font-weight: 700; color: var(--text-primary); }
    .login-card {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px;
    }
    .login-tabs {
      display: flex; gap: 0; margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .login-tab {
      flex: 1; padding: 10px; background: none; border: none;
      color: var(--text-secondary); cursor: pointer; font-size: 14px;
      font-weight: 500; border-bottom: 2px solid transparent;
      margin-bottom: -1px; transition: color 0.15s, border-color 0.15s;
    }
    .login-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; margin-bottom: 6px; font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
    .form-control {
      width: 100%; padding: 10px 14px; background: var(--bg-input);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text-primary); font-size: 14px; transition: border-color 0.15s; outline: none;
    }
    .form-control:focus { border-color: var(--border-focus); }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 10px 20px; border: none; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg {
      background: rgba(255,85,85,0.12); border: 1px solid rgba(255,85,85,0.3);
      color: var(--red); padding: 10px 14px; border-radius: var(--radius-sm);
      font-size: 13px; margin-bottom: 16px; display: none;
    }
    .error-msg.visible { display: block; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-brand">
      <img src="/images/logo.svg" alt="MCI">
      <span class="login-brand-name">Man Cave Inventory</span>
    </div>
    <div class="login-card">
      <div class="login-tabs">
        <button class="login-tab active" id="tabSignIn" onclick="showTab('signin')">Sign In</button>
        <button class="login-tab" id="tabSignUp" onclick="showTab('signup')">Create Account</button>
      </div>

      <div id="errorMsg" class="error-msg"></div>

      <form id="authForm" onsubmit="handleSubmit(event)">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-control" id="inputUsername" type="text" autocomplete="username" autocapitalize="none" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-control" id="inputPassword" type="password" autocomplete="current-password" required>
        </div>
        <div class="form-group" id="confirmGroup" style="display:none">
          <label class="form-label">Confirm Password</label>
          <input class="form-control" id="inputConfirm" type="password" autocomplete="new-password">
        </div>
        <button class="btn btn-primary" id="submitBtn" type="submit">Sign In</button>
      </form>
    </div>
  </div>

  <script>
    let currentTab = 'signin';

    // Redirect if already logged in
    const stored = localStorage.getItem('mci_token');
    if (stored) {
      fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + stored } })
        .then(r => r.ok ? window.location.replace('/') : null)
        .catch(() => {});
    }

    function showTab(tab) {
      currentTab = tab;
      document.getElementById('tabSignIn').classList.toggle('active', tab === 'signin');
      document.getElementById('tabSignUp').classList.toggle('active', tab === 'signup');
      document.getElementById('confirmGroup').style.display = tab === 'signup' ? '' : 'none';
      document.getElementById('submitBtn').textContent = tab === 'signin' ? 'Sign In' : 'Create Account';
      document.getElementById('inputPassword').autocomplete = tab === 'signin' ? 'current-password' : 'new-password';
      hideError();
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('visible');
    }
    function hideError() {
      document.getElementById('errorMsg').classList.remove('visible');
    }

    async function handleSubmit(e) {
      e.preventDefault();
      hideError();
      const username = document.getElementById('inputUsername').value.trim();
      const password = document.getElementById('inputPassword').value;
      const confirm  = document.getElementById('inputConfirm').value;

      if (currentTab === 'signup' && password !== confirm) {
        showError('Passwords do not match');
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = currentTab === 'signin' ? 'Signing in…' : 'Creating…';

      try {
        const endpoint = currentTab === 'signin' ? '/api/auth/login' : '/api/auth/register';
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) { showError(data.error || 'Authentication failed'); return; }
        localStorage.setItem('mci_token', data.token);
        localStorage.setItem('mci_username', data.username);
        window.location.replace('/');
      } catch (err) {
        showError('Network error — is the server running?');
      } finally {
        btn.disabled = false;
        btn.textContent = currentTab === 'signin' ? 'Sign In' : 'Create Account';
      }
    }
  </script>
</body>
</html>
